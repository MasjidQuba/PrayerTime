<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIC Digital Display - Max Visibility</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --primary-blue: #1e4571;
            --gold: #d4af37;
            --iqama-green: #2e7d32;
        }

        body { transition: background 2s ease-in-out; margin: 0; padding: 15px; height: 100vh; display: flex; flex-direction: column; font-family: 'Inter', sans-serif; overflow: hidden; box-sizing: border-box; }

        body.theme-day { background: linear-gradient(180deg, #87CEEB 0%, #f4f7f9 100%); }
        body.theme-night { background: linear-gradient(180deg, #0a192f 0%, #1e4571 100%); }

        /* Symmetrical Header */
        .header-box { height: 160px; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; background: var(--primary-blue); border-radius: 25px; border: 4px solid var(--gold); color: white; flex-shrink: 0; }
        .header-img { height: 135px; width: auto; cursor: pointer; }
        #clock-container { background-color: #000; color: #fff; width: 440px; height: 125px; border-radius: 20px; border: 3px solid var(--gold); display: flex; align-items: center; justify-content: center; }
        #clock { font-size: 6rem; font-weight: 900; letter-spacing: -3px; }

        /* FULL WIDTH PRAYER TABLE - STRETCHED */
        .table-area { flex-grow: 1; margin-top: 15px; width: 100%; display: flex; flex-direction: column; }
        .prayer-table { width: 100%; border-collapse: separate; border-spacing: 0 12px; table-layout: fixed; flex-grow: 1; }
        .table-header th { background: var(--primary-blue); color: #ffffff; font-size: 2.8rem; font-weight: 900; text-transform: uppercase; padding: 15px; border-bottom: 6px solid var(--gold); border-radius: 15px; }
        
        /* Massive Row Height and Fonts */
        .prayer-row td { background: white; height: 10vh; text-align: center; font-size: 5.5rem; font-weight: 900; vertical-align: middle; border-bottom: 5px solid var(--gold); }
        .prayer-row.active td { background: linear-gradient(90deg, #fff9c4 0%, #d4af37 100%) !important; color: #000 !important; border-top: 6px solid #b8860b; border-bottom: 6px solid #b8860b; }
        
        .col-name { text-align: left !important; padding-left: 80px !important; color: var(--primary-blue); border-radius: 25px 0 0 25px; font-size: 5rem !important; }
        .col-iqama { color: var(--iqama-green); font-size: 5.8rem !important; border-radius: 0 25px 25px 0; }

        /* BOTTOM ROW INFO PANEL - COMPACT TO GIVE TABLE SPACE */
        .bottom-info-panel { 
            display: grid; grid-template-columns: 1fr 1.5fr 1fr 1fr; gap: 20px; 
            background: var(--primary-blue); border-radius: 25px; border: 4px solid var(--gold); 
            padding: 12px 20px; color: white; text-align: center; align-items: center; margin-top: 10px;
        }
        
        .info-block { display: flex; flex-direction: column; justify-content: center; }
        .info-value { font-size: 2.2rem; font-weight: 900; }
        .info-hijri { font-family: 'Amiri', serif; font-size: 2.4rem; color: #fff; line-height: 1; }

        .next-box { background: rgba(0,0,0,0.5); padding: 8px; border-radius: 15px; border: 2px solid var(--gold); }
        .next-time { font-size: 2.8rem; font-weight: 900; color: var(--gold); line-height: 1; }

        .weather-info { display: flex; align-items: center; justify-content: center; gap: 15px; }
        .w-icon { font-size: 3.5rem; }
        .temp-val { font-size: 3.5rem; font-weight: 900; }

        /* Donation Bar */
        #donation-box { background: #1b5e20; color: white; padding: 10px 30px; border-radius: 20px; border: 4px solid var(--gold); margin-top: 10px; flex-shrink: 0; }
        .progress-container { width: 100%; background: rgba(255, 255, 255, 0.2); height: 30px; border-radius: 15px; border: 2px solid var(--gold); overflow: hidden; position: relative; margin-top: 5px; }
        .progress-fill { height: 100%; background: var(--gold); width: 0%; transition: width 2s; }
        .progress-text { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: 900; font-size: 1.3rem; }
    </style>
</head>
<body class="theme-day">

<div class="header-box">
    <img src="Muhammad.png" class="header-img" onclick="location.reload()">
    <div id="clock-container"><div id="clock">00:00:00</div></div>
    <img src="Allah.png" class="header-img">
</div>

<div class="table-area">
    <table class="prayer-table">
        <thead>
            <tr class="table-header">
                <th style="width: 38%; text-align: left; padding-left: 80px;">Salah</th>
                <th style="width: 31%;">Starting</th>
                <th style="width: 31%;">Iqamah</th>
            </tr>
        </thead>
        <tbody id="prayer-body"></tbody>
    </table>
</div>

<div class="bottom-info-panel">
    <div class="info-block">
        <div id="big-day" style="font-size: 2rem; font-weight: 900; color: var(--gold); text-transform: uppercase; line-height: 1;">----</div>
        <div id="big-greg" class="info-value" style="font-size: 1.8rem; margin-top: 5px;">-- --- ----</div>
    </div>
    
    <div class="info-block">
        <div style="font-size: 1rem; color: var(--gold); font-weight: 800; text-transform: uppercase;">Hijri Date</div>
        <div id="big-hijri" class="info-hijri">-- --- ----</div>
    </div>

    <div class="next-box">
        <div style="font-size: 1rem; font-weight: 800; color: #fff;">Next: <span id="next-salah-name" style="color:var(--gold)">--</span></div>
        <div id="countdown-timer" class="next-time">0h 00m</div>
    </div>

    <div class="weather-info">
        <span id="w-icon" class="w-icon">☀️</span>
        <div id="temp" class="temp-val">--°C</div>
        <div style="font-size: 1rem; color: var(--gold); font-weight: 800; line-height: 1.1;">WHITBY<br>ON</div>
    </div>
</div>

<div id="donation-box">
    <div style="text-align: center; font-weight: 900; color: var(--gold); font-size: 1.2rem;">LOAN REPAYMENT GOAL: C$ 2.5M</div>
    <div class="progress-container">
        <div id="progress-text" class="progress-text">0% Raised</div>
        <div id="progress-fill" class="progress-fill"></div>
    </div>
</div>

<script>
    const GOAL = 2500000, RAISED = 1400000; 
    const iqamaTimes = { Fajr: "5:30", Dhuhr: "2:00", Asr: "6:45", Isha: "10:00" };
    const salahList = [{id:'Fajr',ar:'الفجر'},{id:'Sunrise',ar:'الشروق'},{id:'Dhuhr',ar:'الظهر'},{id:'Asr',ar:'العصر'},{id:'Maghrib',ar:'المغرب'},{id:'Isha',ar:'العشاء'}];
    
    let useArabic = false;
    let prayerTimings = {};

    function getWeatherIcon(code) {
        if (code <= 1) return "☀️";
        if (code <= 3) return "☁️";
        if (code <= 48) return "🌫️";
        if (code <= 67) return "🌧️";
        if (code <= 77) return "❄️";
        if (code <= 82) return "🌦️";
        if (code <= 99) return "⛈️";
        return "☀️";
    }

    function format12Hour(timeStr) {
        if (!timeStr) return "--:--";
        let [h, m] = timeStr.split(':').map(Number);
        h = h % 12 || 12;
        return `${h}:${m.toString().padStart(2, '0')}`;
    }

    async function updateData() {
        const lat = 43.8975, lng = -78.9429;
        try {
            const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,is_day,weather_code&timezone=America/Toronto`);
            const wData = await wRes.json();
            document.getElementById('temp').innerText = Math.round(wData.current.temperature_2m) + "°C";
            document.getElementById('w-icon').innerText = getWeatherIcon(wData.current.weather_code);
            document.body.className = wData.current.is_day ? 'theme-day' : 'theme-night';
        } catch (e) {}

        try {
            const pRes = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lng}&method=99&methodSettings=15,null,17.5&school=1`);
            const d = await pRes.json();
            prayerTimings = d.data.timings;
            const h = d.data.date.hijri;
            document.getElementById('big-hijri').innerText = `${h.day} ${h.month.en} ${h.year}`;
            renderTable();
        } catch (e) {}
    }

    function renderTable() {
        if (!prayerTimings.Fajr) return;
        const now = new Date();
        const curMin = now.getHours() * 60 + now.getMinutes();
        let activeIdx = 0;
        salahList.forEach((s, i) => {
            const [h, m] = prayerTimings[s.id].split(':').map(Number);
            if (curMin >= (h * 60 + m)) activeIdx = i;
        });

        let nextS = null;
        for (let s of salahList) {
            const [h, m] = prayerTimings[s.id].split(':').map(Number);
            if ((h * 60 + m) > curMin) { nextS = s; break; }
        }
        if (!nextS) nextS = salahList[0];

        let html = '';
        salahList.forEach((s, i) => {
            const active = (i === activeIdx) ? "active" : "";
            const name = useArabic ? s.ar : s.id;
            const fontStyle = useArabic ? "font-family:'Amiri',serif;" : "";
            let iqama = (s.id === 'Sunrise') ? 'Ishraq' : (s.id === 'Maghrib' ? '+ 3m' : iqamaTimes[s.id]);
            html += `<tr class="prayer-row ${active}"><td class="col-name" style="${fontStyle}">${name}</td><td>${format12Hour(prayerTimings[s.id])}</td><td class="col-iqama">${iqama}</td></tr>`;
        });
        document.getElementById('prayer-body').innerHTML = html;

        const [nh, nm] = prayerTimings[nextS.id].split(':').map(Number);
        let nextMinTotal = nh * 60 + nm;
        if (nextMinTotal <= curMin) nextMinTotal += 1440; 
        const diff = nextMinTotal - curMin;
        document.getElementById('next-salah-name').innerText = nextS.id;
        document.getElementById('countdown-timer').innerText = `${Math.floor(diff / 60)}h ${diff % 60}m`;
    }

    function runClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', second:'2-digit', hour12:true }).split(' ')[0];
        document.getElementById('big-day').innerText = now.toLocaleDateString('en-US', { weekday: 'long' });
        document.getElementById('big-greg').innerText = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        renderTable(); 
    }

    setInterval(() => { useArabic = !useArabic; renderTable(); }, 3000);
    setInterval(runClock, 1000);
    setInterval(updateData, 300000);
    updateData(); runClock();

    setTimeout(() => {
        const percent = Math.min((RAISED / GOAL) * 100, 100).toFixed(1);
        document.getElementById('progress-fill').style.width = percent + "%";
        document.getElementById('progress-text').innerText = `${percent}% Raised ($${RAISED.toLocaleString()})`;
    }, 1000);
</script>
</body>
</html>
