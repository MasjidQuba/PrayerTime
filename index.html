<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIC Digital Display - Daily Production</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --primary-blue: #1e4571;
            --gold: #d4af37;
            --iqama-green: #2e7d32;
        }

        body { transition: background 2s ease-in-out; margin: 0; padding: 15px; height: 100vh; display: flex; flex-direction: column; font-family: 'Inter', sans-serif; overflow: hidden; box-sizing: border-box; }

        /* Themes */
        body.theme-day { background: linear-gradient(180deg, #87CEEB 0%, #f4f7f9 100%); }
        body.theme-night { background: linear-gradient(180deg, #0a192f 0%, #1e4571 100%); }

        /* Header */
        .header-box { height: 110px; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; background: var(--primary-blue); border-radius: 20px; border: 3px solid var(--gold); color: white; flex-shrink: 0; }
        .header-img { height: 80px; cursor: pointer; }
        #clock-container { background-color: #000; color: #fff; width: 340px; height: 85px; border-radius: 15px; border: 3px solid var(--gold); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #clock { font-size: 3rem; font-weight: 900; }

        /* Date Row */
        .date-row { 
            display: flex; justify-content: space-around; align-items: center;
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px);
            margin-top: 10px; padding: 12px; border-radius: 20px; border: 2px solid rgba(255,255,255,0.3);
            flex-shrink: 0;
        }
        .date-item { text-align: center; flex: 1; }
        .date-label { font-size: 1rem; font-weight: 800; color: var(--primary-blue); text-transform: uppercase; margin-bottom: 2px; }
        .date-main { font-size: 2.8rem; font-weight: 900; color: #000; }
        body.theme-night .date-main { color: #fff; }
        body.theme-night .date-label { color: var(--gold); }

        /* PRAYER TABLE - Full Height Focus */
        .prayer-table { width: 100%; flex-grow: 1; margin-top: 15px; border-collapse: separate; border-spacing: 0 10px; table-layout: fixed; }
        
        .table-header th { 
            background: var(--primary-blue); color: #ffffff; font-size: 1.8rem; 
            font-weight: 900; text-transform: uppercase; padding: 15px; 
            border-bottom: 4px solid var(--gold); border-radius: 10px;
        }
        .header-ar { color: var(--gold) !important; font-family: 'Amiri', serif; font-size: 2.5rem !important; }

        .prayer-row td { background: white; height: 9.5vh; text-align: center; font-size: 3.2rem; font-weight: 800; border-bottom: 4px solid var(--gold); vertical-align: middle; }
        .prayer-row.active td { background: linear-gradient(90deg, #fff9c4 0%, #d4af37 100%) !important; color: #000; border-top: 4px solid #b8860b; border-bottom: 4px solid #b8860b; }
        
        .col-en { text-align: left !important; padding-left: 45px !important; border-radius: 20px 0 0 20px; color: var(--primary-blue); font-size: 2.8rem !important; }
        .col-ar { text-align: right !important; padding-right: 45px !important; font-family: 'Amiri', serif; font-size: 3.8rem !important; border-radius: 0 20px 20px 0; color: var(--primary-blue); line-height: 1.1; }

        .footer-contact { background: var(--primary-blue); color: var(--gold); text-align: center; padding: 12px; font-size: 1.4rem; font-weight: 700; border-radius: 15px; margin-top: 15px; }
    </style>
</head>
<body class="theme-day">

<div class="header-box">
    <img src="Muhammad.png" class="header-img" onclick="location.reload()">
    <div style="display:flex; align-items:center; gap: 30px;">
        <div id="clock-container"><div id="clock">00:00:00 AM</div></div>
        <div style="text-align: left;">
            <div id="temp" style="font-size: 2rem; font-weight: 900;">--°C</div>
            <div id="city-name" style="font-size: 1rem; color: var(--gold); font-weight: 800;">WHITBY, ON</div>
        </div>
    </div>
    <img src="Allah.png" class="header-img">
</div>

<div class="date-row">
    <div class="date-item">
        <div class="date-label">Gregorian</div>
        <div id="big-greg" class="date-main">-- --- ----</div>
    </div>
    <div class="date-item" style="border-left: 2px solid var(--gold); border-right: 2px solid var(--gold);">
        <div class="date-label">Day</div>
        <div id="big-day" class="date-main">----</div>
    </div>
    <div class="date-item">
        <div class="date-label">Hijri</div>
        <div id="big-hijri" class="date-main">-- --- ----</div>
    </div>
</div>

<table class="prayer-table">
    <thead>
        <tr class="table-header">
            <th style="text-align: left; padding-left: 45px;">Salah</th>
            <th>Adhan</th>
            <th>Iqamah</th>
            <th class="header-ar" style="text-align: right; padding-right: 45px;">الصلاة</th>
        </tr>
    </thead>
    <tbody id="prayer-body"></tbody>
</table>

<div class="footer-contact">info@ajaxmasjid.ca | Lakeridge Islamic Centre</div>

<script>
    const iqamaTimes = { Fajr: "6:30 AM", Dhuhr: "2:00 PM", Asr: "6:00 PM", Isha: "9:15 PM" };
    const salahList = [{id:'Fajr',ar:'الفجر'},{id:'Sunrise',ar:'الشروق'},{id:'Dhuhr',ar:'الظهر'},{id:'Asr',ar:'العصر'},{id:'Maghrib',ar:'المغرب'},{id:'Isha',ar:'العشاء'}];
    
    function format12Hour(timeStr) {
        if (!timeStr) return "--:--";
        let [h, m] = timeStr.split(':').map(Number);
        const ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        return `${h}:${m.toString().padStart(2, '0')} ${ampm}`;
    }

    async function updateData() {
        const lat = 43.8975, lng = -78.9429;
        try {
            const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,is_day&timezone=America/Toronto`);
            const wData = await wRes.json();
            document.getElementById('temp').innerText = Math.round(wData.current.temperature_2m) + "°C";
            document.body.className = wData.current.is_day ? 'theme-day' : 'theme-night';
        } catch (e) { console.error("Weather Error"); }

        try {
            const pRes = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lng}&method=99&methodSettings=15,null,17.5&school=1`);
            const d = await pRes.json();
            const t = d.data.timings;
            document.getElementById('big-hijri').innerText = `${d.data.date.hijri.day} ${d.data.date.hijri.month.en} ${d.data.date.hijri.year}`;

            const now = new Date();
            const curMin = now.getHours() * 60 + now.getMinutes();
            let activeIdx = 0;
            salahList.forEach((s, i) => {
                const [h, m] = t[s.id].split(':').map(Number);
                if (curMin >= (h * 60 + m)) activeIdx = i;
            });

            let html = '';
            salahList.forEach((s, i) => {
                const active = (i === activeIdx) ? "active" : "";
                let iqama = (s.id === 'Sunrise') ? 'Ishraq' : (s.id === 'Maghrib' ? 'Adhan + 3m' : iqamaTimes[s.id]);
                html += `<tr class="prayer-row ${active}"><td class="col-en">${s.id}</td><td>${format12Hour(t[s.id])}</td><td style="color:var(--iqama-green)">${iqama}</td><td class="col-ar">${s.ar}</td></tr>`;
            });
            document.getElementById('prayer-body').innerHTML = html;
        } catch (e) { console.error("Prayer Error"); }
    }

    function runClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', second:'2-digit', hour12:true });
        document.getElementById('big-day').innerText = now.toLocaleDateString('en-US', { weekday: 'long' });
        document.getElementById('big-greg').innerText = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    let initialHash = "";
    async function autoRefresh() {
        try {
            const cacheBuster = Math.random();
            const res = await fetch(window.location.href + "?v=" + cacheBuster, { method: 'GET', headers: { 'Cache-Control': 'no-cache' } });
            const text = await res.text();
            if (initialHash && initialHash !== text.length.toString()) window.location.reload(true);
            initialHash = text.length.toString();
        } catch(e) {}
    }

    setInterval(runClock, 1000);
    setInterval(updateData, 300000); 
    setInterval(autoRefresh, 60000); 
    updateData(); runClock();
</script>
</body>
</html>
