<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIC Digital Display - Khatmul Quran Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --primary-blue: #1e4571;
            --gold: #d4af37;
            --iqama-green: #2e7d32;
            --highlight-row: #fff9c4;
        }

        /* Dynamic Weather Themes */
        body.theme-day { background: linear-gradient(180deg, #87CEEB 0%, #f4f7f9 100%); }
        body.theme-night { background: linear-gradient(180deg, #0a192f 0%, #1e4571 100%); }
        body.theme-night .prayer-row td { background: rgba(255,255,255,0.9); }
        body.theme-cloudy { background: linear-gradient(180deg, #708090 0%, #bdc3c7 100%); }

        body { transition: background 2s ease-in-out; margin: 0; padding: 15px; height: 100vh; display: flex; flex-direction: column; font-family: 'Inter', sans-serif; overflow: hidden; box-sizing: border-box; }

        /* Symmetrical Header */
        .header-box { height: 160px; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; background: var(--primary-blue); border-radius: 25px; border: 4px solid var(--gold); color: white; flex-shrink: 0; }
        .header-img { height: 110px; width: auto; }
        .clock-section { display: flex; align-items: center; justify-content: center; width: 900px; }

        .sidebar { width: 140px; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 120px; flex-shrink: 0; }
        .left-sidebar { border-right: 3px solid var(--gold); padding-right: 15px; }
        .right-sidebar { border-left: 3px solid var(--gold); padding-left: 15px; }

        .sidebar-main { font-size: 1.5rem; font-weight: 900; color: white; }
        .sidebar-sub { font-size: 1.1rem; color: var(--gold); font-weight: 800; text-transform: uppercase; }

        #clock-container { background-color: #000; color: #fff; width: 310px; height: 130px; border-radius: 20px; border: 3px solid var(--gold); display: flex; align-items: center; justify-content: center; margin: 0 20px; flex-shrink: 0; overflow: hidden; }
        #clock { font-size: 2.8rem; font-weight: 900; font-variant-numeric: tabular-nums; letter-spacing: 1px; white-space: nowrap; }

        /* Stretched Table */
        .prayer-table { width: 100%; flex-grow: 1; margin-top: 10px; border-collapse: separate; border-spacing: 0 8px; table-layout: fixed; }
        .table-header th { color: var(--primary-blue); font-size: 1.6rem; font-weight: 900; text-transform: uppercase; padding: 5px; text-align: center; }
        .prayer-row td { background: white; padding: 0; height: 12vh; text-align: center; font-size: 3.2rem; font-weight: 800; border-bottom: 4px solid var(--gold); }
        
        .prayer-row.active td { 
            background: linear-gradient(90deg, #fff9c4 0%, #d4af37 100%) !important; 
            border-top: 5px solid #b8860b; 
            border-bottom: 5px solid #b8860b; 
            color: #000; 
        }
        .sunrise-row td { background: #fff3e0; color: #e65100; font-size: 2.5rem; opacity: 0.9; height: 8vh; }

        .col-en { text-align: left !important; padding-left: 40px !important; border-radius: 20px 0 0 20px; color: var(--primary-blue); text-transform: uppercase; }
        .col-ar { text-align: right !important; padding-right: 40px !important; font-family: 'Amiri', serif; font-size: 4rem !important; border-radius: 0 20px 20px 0; color: var(--primary-blue); }

        /* Khatmul Quran Notification */
        .quran-notification { 
            background: #1b5e20; 
            color: white; 
            padding: 20px; 
            border-radius: 20px; 
            text-align: center; 
            margin-top: 15px; 
            border: 4px solid var(--gold);
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            animation: pulse-border 2s infinite;
        }
        .quran-text-ar { font-family: 'Amiri', serif; font-size: 2.8rem; display: block; margin-bottom: 5px; }
        .quran-text-en { font-size: 2.2rem; font-weight: 900; color: var(--gold); text-transform: uppercase; }

        @keyframes pulse-border {
            0% { border-color: var(--gold); }
            50% { border-color: #fff; }
            100% { border-color: var(--gold); }
        }

        .footer-contact { background: var(--primary-blue); color: var(--gold); text-align: center; padding: 8px; font-size: 1.3rem; font-weight: 700; border-top: 3px solid var(--gold); margin-top: 10px; border-radius: 15px 15px 0 0; }

        /* Donation Overlay */
        #donation-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle, var(--primary-blue) 0%, #0a192f 100%); display: none; flex-direction: column; justify-content: space-evenly; align-items: center; z-index: 9999; color: white; border: 20px solid var(--gold); box-sizing: border-box; }
    </style>
</head>
<body class="theme-day">

<div class="header-box">
    <img src="Muhammad.png" class="header-img" onclick="toggleTestDonation()" style="cursor: pointer;">
    <div class="clock-section">
        <div class="sidebar left-sidebar">
            <div id="greg-day" class="sidebar-main">--</div>
            <div id="greg-date" class="sidebar-sub">-- --- ----</div>
        </div>
        <div id="clock-container"><div id="clock">00:00:00 AM</div></div>
        <div class="sidebar right-sidebar">
            <div id="temp" class="sidebar-main">--°C</div>
            <div id="city-name" class="sidebar-sub">Whitby</div>
            <div id="hijri" style="font-size: 1.2rem; font-weight: 700; color: #fff; margin-top: 5px;">-- --- ----</div>
        </div>
    </div>
    <img src="Allah.png" class="header-img">
</div>

<table class="prayer-table">
    <thead>
        <tr class="table-header">
            <th style="text-align: left; padding-left: 40px;">Salah</th>
            <th>Starting</th>
            <th>Iqamah</th>
            <th style="text-align: right; padding-right: 40px; font-size:2.5rem;">الصلاة</th>
        </tr>
    </thead>
    <tbody id="prayer-body"></tbody>
</table>

<div class="quran-notification">
    <span class="quran-text-ar">خَتْمُ القُرْآنِ الكَرِيمِ</span>
    <span class="quran-text-en">Khatmul Quran Notification</span>
</div>

<div class="footer-contact">info@ajaxmasjid.ca | www.ajaxmasjid.ca</div>

<div id="donation-overlay">
    <div class="qr-row" style="background: white; padding: 20px; border-radius: 25px; border: 6px solid var(--gold);">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=350x350&data=https://www.ajaxmasjid.ca" alt="QR" style="width: 320px; height: 320px;">
        <div style="color: black; font-weight: 900; margin-top: 10px; font-size: 1.5rem; text-align: center;">SCAN TO DONATE</div>
    </div>
    <div style="font-size: 3.5rem; font-weight: 900; color: var(--gold);">PLEASE DONATE GENEROUSLY</div>
</div>

<script>
    const GOAL = 1400000, RAISED = 100000;
    const iqamaTimes = { Fajr: "6:35 AM", Dhuhr: "2:00 PM", Asr: "6:00 PM", Isha: "9:00 PM" };
    const salahList = [{id:'Fajr',ar:'الفجر'},{id:'Sunrise',ar:'الشروق'},{id:'Dhuhr',ar:'الظهر'},{id:'Asr',ar:'العصر'},{id:'Maghrib',ar:'المغرب'},{id:'Isha',ar:'العشاء'}];
    let forceDonation = false;

    function toggleTestDonation() {
        forceDonation = !forceDonation;
        const ov = document.getElementById('donation-overlay');
        ov.style.display = forceDonation ? 'flex' : 'none';
    }

    function format12Hour(timeStr) {
        if (!timeStr || typeof timeStr !== 'string') return "--:--";
        let clean = timeStr.replace(/AM|PM/gi, '').trim();
        let [h, m] = clean.split(':').map(Number);
        const ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        return `${h}:${m.toString().padStart(2, '0')} ${ampm}`;
    }

    async function updateLocationAndWeather() {
        const lat = 43.8975, lng = -78.9429;
        try {
            const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,is_day,weather_code&timezone=America/Toronto`);
            const wData = await wRes.json();
            document.getElementById('temp').innerText = Math.round(wData.current.temperature_2m) + "°C";
            
            const b = document.body;
            b.classList.remove('theme-day', 'theme-night', 'theme-cloudy');
            if (wData.current.weather_code >= 3) b.classList.add('theme-cloudy');
            else if (wData.current.is_day) b.classList.add('theme-day');
            else b.classList.add('theme-night');
        } catch (e) { console.error("Weather Error"); }

        try {
            const pRes = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lng}&method=99&methodSettings=15,null,17.5&school=1`);
            const d = await pRes.json();
            const t = d.data.timings;

            document.getElementById('hijri').innerText = `${d.data.date.hijri.day} ${d.data.date.hijri.month.en} ${d.data.date.hijri.year}`;

            const now = new Date();
            const curMin = now.getHours() * 60 + now.getMinutes();
            let idx = 0;
            let html = '';

            salahList.forEach((s, i) => {
                const [h, m] = t[s.id].split(':').map(Number);
                if (curMin >= (h * 60 + m)) idx = i;
            });

            salahList.forEach((s, i) => {
                const active = (i === idx) ? "active" : "";
                let adhan = format12Hour(t[s.id]), iqama;
                
                if (s.id === 'Sunrise') iqama = 'Ishraq';
                else if (s.id === 'Maghrib') {
                    const [h, m] = t[s.id].split(':').map(Number);
                    const dt = new Date(); dt.setHours(h); dt.setMinutes(m + 5); // Maghrib + 5 mins
                    iqama = format12Hour(dt.getHours() + ":" + dt.getMinutes());
                } else iqama = format12Hour(iqamaTimes[s.id]);
                
                html += `<tr class="prayer-row ${s.id==='Sunrise'?'sunrise-row':''} ${active}">
                    <td class="col-en">${s.id}</td><td>${adhan}</td>
                    <td style="color:var(--iqama-green)">${iqama}</td><td class="col-ar">${s.ar}</td></tr>`;
            });
            document.getElementById('prayer-body').innerHTML = html;
        } catch (e) { console.error("Prayer Error"); }
    }

    function runClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', second:'2-digit', hour12:true });
        const d = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
        const m = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        document.getElementById('greg-day').innerText = d[now.getDay()];
        document.getElementById('greg-date').innerText = `${now.getDate()} ${m[now.getMonth()]} ${now.getFullYear()}`;
    }

    setInterval(runClock, 1000); 
    setInterval(updateLocationAndWeather, 60000);
    updateLocationAndWeather(); 
    runClock();
</script>
</body>
</html>
