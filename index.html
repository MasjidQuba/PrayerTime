<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIC Digital Display - Large Font Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --primary-blue: #1e4571;
            --gold: #d4af37;
            --iqama-green: #2e7d32;
        }

        body { transition: background 2s ease-in-out; margin: 0; padding: 15px; height: 100vh; display: flex; flex-direction: column; font-family: 'Inter', sans-serif; overflow: hidden; box-sizing: border-box; }

        /* Themes */
        body.theme-day { background: linear-gradient(180deg, #87CEEB 0%, #f4f7f9 100%); }
        body.theme-night { background: linear-gradient(180deg, #0a192f 0%, #1e4571 100%); }

        /* Header */
        .header-box { height: 90px; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; background: var(--primary-blue); border-radius: 20px; border: 3px solid var(--gold); color: white; flex-shrink: 0; }
        .header-img { height: 65px; cursor: pointer; }
        #clock-container { background-color: #000; color: #fff; width: 300px; height: 70px; border-radius: 15px; border: 3px solid var(--gold); display: flex; align-items: center; justify-content: center; }
        #clock { font-size: 2.6rem; font-weight: 900; }

        /* Date Row */
        .date-row { display: flex; justify-content: space-around; align-items: center; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); margin-top: 8px; padding: 8px; border-radius: 15px; border: 2px solid rgba(255,255,255,0.3); flex-shrink: 0; }
        .date-main { font-size: 2.2rem; font-weight: 900; color: #000; }
        body.theme-night .date-main { color: #fff; }

        /* Prayer Table - ENLARGED FOR 40FT VIEWING */
        .prayer-table { width: 100%; margin-top: 8px; border-collapse: separate; border-spacing: 0 10px; table-layout: fixed; flex-grow: 1; }
        .table-header th { background: var(--primary-blue); color: #ffffff; font-size: 1.6rem; font-weight: 900; text-transform: uppercase; padding: 10px; border-bottom: 3px solid var(--gold); border-radius: 8px; }
        
        /* Row height increased to accommodate massive fonts */
        .prayer-row td { background: white; height: 9vh; text-align: center; font-size: 3.8rem; font-weight: 900; border-bottom: 4px solid var(--gold); vertical-align: middle; }
        
        .prayer-row.active td { 
            background: linear-gradient(90deg, #fff9c4 0%, #d4af37 100%) !important; 
            color: #000; 
            border-top: 4px solid #b8860b; 
            border-bottom: 4px solid #b8860b;
            transform: scale(1.01); /* Subtle pop for active prayer */
        }

        .col-en { text-align: left !important; padding-left: 45px !important; border-radius: 15px 0 0 15px; color: var(--primary-blue); font-size: 3.5rem !important; }
        .col-ar { text-align: right !important; padding-right: 45px !important; font-family: 'Amiri', serif; font-size: 4.5rem !important; border-radius: 0 15px 15px 0; color: var(--primary-blue); line-height: 1; }

        /* FUNDRAISING PROGRESS BOX */
        #donation-box { 
            background: #1b5e20; color: white; padding: 15px 30px; 
            border-radius: 20px; text-align: center; margin-top: 10px; 
            border: 4px solid var(--gold); display: flex; flex-direction: column; 
            justify-content: center; flex-shrink: 0; min-height: 150px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .donate-title { font-size: 2.2rem; font-weight: 900; color: var(--gold); text-transform: uppercase; margin-bottom: 5px; }
        .donate-msg { font-size: 1.6rem; font-weight: 700; color: #fff; margin-bottom: 12px; }

        .progress-container { width: 100%; background: rgba(255, 255, 255, 0.2); height: 40px; border-radius: 20px; border: 2px solid var(--gold); overflow: hidden; position: relative; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold) 0%, #fffde7 100%); width: 0%; transition: width 2s ease-in-out; }
        .progress-text { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: 900; font-size: 1.6rem; z-index: 2; }

        .footer-contact { background: var(--primary-blue); color: var(--gold); text-align: center; padding: 6px; font-size: 1.1rem; font-weight: 700; border-radius: 10px; margin-top: 8px; }
    </style>
</head>
<body class="theme-day">

<div class="header-box">
    <img src="Muhammad.png" class="header-img" onclick="location.reload()">
    <div style="display:flex; align-items:center; gap: 20px;">
        <div id="clock-container"><div id="clock">00:00:00 AM</div></div>
        <div style="text-align: left;">
            <div id="temp" style="font-size: 1.8rem; font-weight: 900;">--°C</div>
            <div id="city-name" style="font-size: 0.9rem; color: var(--gold); font-weight: 800;">WHITBY, ON</div>
        </div>
    </div>
    <img src="Allah.png" class="header-img">
</div>

<div class="date-row">
    <div class="date-item"><span id="big-greg" class="date-main">-- --- ----</span></div>
    <div class="date-item"><span id="big-day" class="date-main">----</span></div>
    <div class="date-item"><span id="big-hijri" class="date-main">-- --- ----</span></div>
</div>

<table class="prayer-table">
    <thead>
        <tr class="table-header">
            <th style="text-align: left; padding-left: 45px;">Salah</th>
            <th>Adhan</th>
            <th>Iqamah</th>
            <th style="text-align: right; padding-right: 45px; font-family: 'Amiri', serif; font-size: 2.2rem;">الصلاة</th>
        </tr>
    </thead>
    <tbody id="prayer-body"></tbody>
</table>

<div id="donation-box">
    <div class="donate-title">Donate Generously</div>
    <div class="donate-msg">C$ 1.1M Loan Repayment Goal (End of 2026)</div>
    <div class="progress-container">
        <div id="progress-text" class="progress-text">0%</div>
        <div id="progress-fill" class="progress-fill"></div>
    </div>
</div>

<div class="footer-contact">info@ajaxmasjid.ca | Lakeridge Islamic Centre</div>

<script>
    const GOAL = 2500000;
    const RAISED = 1400000; 

    const iqamaTimes = { Fajr: "6:00 AM", Dhuhr: "2:00 PM", Asr: "6:30 PM", Isha: "9:45 PM" };
    const salahList = [{id:'Fajr',ar:'الفجر'},{id:'Sunrise',ar:'الشروق'},{id:'Dhuhr',ar:'الظهر'},{id:'Asr',ar:'العصر'},{id:'Maghrib',ar:'المغرب'},{id:'Isha',ar:'العشاء'}];

    function updateProgressBar() {
        const percent = Math.min((RAISED / GOAL) * 100, 100).toFixed(1);
        document.getElementById('progress-fill').style.width = percent + "%";
        document.getElementById('progress-text').innerText = `${percent}% Raised ($${RAISED.toLocaleString()})`;
    }

    function format12Hour(timeStr) {
        if (!timeStr) return "--:--";
        let [h, m] = timeStr.split(':').map(Number);
        const ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        return `${h}:${m.toString().padStart(2, '0')} ${ampm}`;
    }

    async function updateData() {
        const lat = 43.8975, lng = -78.9429;
        try {
            const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,is_day&timezone=America/Toronto`);
            const wData = await wRes.json();
            document.getElementById('temp').innerText = Math.round(wData.current.temperature_2m) + "°C";
            document.body.className = wData.current.is_day ? 'theme-day' : 'theme-night';
        } catch (e) { console.error("Weather Error"); }

        try {
            const pRes = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lng}&method=99&methodSettings=15,null,17.5&school=1`);
            const d = await pRes.json();
            const t = d.data.timings;
            document.getElementById('big-hijri').innerText = `${d.data.date.hijri.day} ${d.data.date.hijri.month.en} ${d.data.date.hijri.year}`;

            const now = new Date();
            const curMin = now.getHours() * 60 + now.getMinutes();
            let activeIdx = 0;
            salahList.forEach((s, i) => {
                const [h, m] = t[s.id].split(':').map(Number);
                if (curMin >= (h * 60 + m)) activeIdx = i;
            });

            let html = '';
            salahList.forEach((s, i) => {
                const active = (i === activeIdx) ? "active" : "";
                let iqama = (s.id === 'Sunrise') ? 'Ishraq' : (s.id === 'Maghrib' ? 'Adhan + 3m' : iqamaTimes[s.id]);
                html += `<tr class="prayer-row ${active}"><td class="col-en">${s.id}</td><td>${format12Hour(t[s.id])}</td><td style="color:var(--iqama-green)">${iqama}</td><td class="col-ar">${s.ar}</td></tr>`;
            });
            document.getElementById('prayer-body').innerHTML = html;
        } catch (e) { console.error("Prayer Error"); }
    }

    function runClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', second:'2-digit', hour12:true });
        document.getElementById('big-day').innerText = now.toLocaleDateString('en-US', { weekday: 'long' });
        document.getElementById('big-greg').innerText = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    let contentHash = "";
    async function checkVer() {
        try {
            const res = await fetch(window.location.href + "?cb=" + Math.random());
            const text = await res.text();
            if (contentHash && contentHash !== text.length.toString()) location.reload();
            contentHash = text.length.toString();
        } catch(e) {}
    }

    setInterval(runClock, 1000);
    setInterval(updateData, 300000); 
    setInterval(checkVer, 60000); 
    updateData(); runClock(); 
    setTimeout(updateProgressBar, 1000); 
</script>
</body>
</html>
