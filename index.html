<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIC Digital Display - Symmetrical Repurposed Layout</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --primary-blue: #1e4571;
            --gold: #d4af37;
            --iqama-green: #2e7d32;
        }

        body { transition: background 2s ease-in-out; margin: 0; padding: 15px; height: 100vh; display: flex; flex-direction: column; font-family: 'Inter', sans-serif; overflow: hidden; box-sizing: border-box; }

        body.theme-day { background: linear-gradient(180deg, #87CEEB 0%, #f4f7f9 100%); }
        body.theme-night { background: linear-gradient(180deg, #0a192f 0%, #1e4571 100%); }

        /* Symmetrical Header */
        .header-box { height: 160px; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; background: var(--primary-blue); border-radius: 25px; border: 4px solid var(--gold); color: white; flex-shrink: 0; }
        .header-img { height: 130px; width: auto; cursor: pointer; }
        
        #clock-container { background-color: #000; color: #fff; width: 380px; height: 120px; border-radius: 20px; border: 3px solid var(--gold); display: flex; align-items: center; justify-content: center; }
        #clock { font-size: 5rem; font-weight: 900; letter-spacing: -2px; }

        /* Layout Container for Table + Info */
        .main-container { display: flex; gap: 20px; flex-grow: 1; margin-top: 15px; }

        /* NEW LEFT INFO PANEL (Repurposed area) */
        .side-info-panel { 
            width: 300px; background: var(--primary-blue); border-radius: 25px; 
            border: 4px solid var(--gold); display: flex; flex-direction: column; 
            justify-content: space-around; padding: 20px; text-align: center; color: white;
        }
        .info-label { font-size: 1rem; color: var(--gold); font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        .info-value { font-size: 2.2rem; font-weight: 900; line-height: 1.1; margin-bottom: 10px; }
        .info-hijri { font-family: 'Amiri', serif; font-size: 2.8rem; color: #fff; }

        /* TWO-COLUMN PRAYER TABLE */
        .prayer-table { flex-grow: 1; border-collapse: separate; border-spacing: 0 10px; table-layout: fixed; }
        .table-header th { background: var(--primary-blue); color: #ffffff; font-size: 1.8rem; font-weight: 900; text-transform: uppercase; padding: 12px; border-bottom: 3px solid var(--gold); border-radius: 12px; }
        
        .prayer-row td { background: white; height: 10vh; text-align: center; border-bottom: 4px solid var(--gold); vertical-align: middle; position: relative; }
        
        /* Cell containing both Name and Adhan */
        .col-adhan { width: 60%; font-size: 4rem; font-weight: 900; color: #000; border-radius: 20px 0 0 20px; text-align: left !important; padding-left: 30px !important; }
        .salah-label-overlay { font-size: 1.5rem; color: var(--primary-blue); display: block; text-transform: uppercase; opacity: 0.8; margin-bottom: -10px; }

        .col-iqama { width: 40%; font-size: 4.5rem; font-weight: 900; color: var(--iqama-green); border-radius: 0 20px 20px 0; }

        .prayer-row.active td { 
            background: linear-gradient(90deg, #fff9c4 0%, #d4af37 100%) !important; 
            border-top: 5px solid #b8860b; border-bottom: 5px solid #b8860b;
        }

        /* Donation Box */
        #donation-box { background: #1b5e20; color: white; padding: 10px 30px; border-radius: 20px; border: 4px solid var(--gold); margin-top: 15px; }
        .progress-container { width: 100%; background: rgba(255, 255, 255, 0.2); height: 35px; border-radius: 20px; border: 2px solid var(--gold); overflow: hidden; position: relative; margin-top: 5px; }
        .progress-fill { height: 100%; background: var(--gold); width: 0%; transition: width 2s; }
        .progress-text { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: 900; }
    </style>
</head>
<body class="theme-day">

<div class="header-box">
    <img src="Muhammad.png" class="header-img" onclick="location.reload()">
    <div id="clock-container"><div id="clock">00:00:00</div></div>
    <img src="Allah.png" class="header-img">
</div>

<div class="main-container">
    <div class="side-info-panel">
        <div>
            <div class="info-label">Current Day</div>
            <div id="big-day" class="info-value" style="color: var(--gold);">----</div>
        </div>
        <div>
            <div class="info-label">Gregorian</div>
            <div id="big-greg" class="info-value">-- --- ----</div>
        </div>
        <div>
            <div class="info-label">Hijri</div>
            <div id="big-hijri" class="info-hijri">-- --- ----</div>
        </div>
        <div>
            <div class="info-label">Weather</div>
            <div id="temp" class="info-value">--°C</div>
            <div style="font-size: 1rem; color: var(--gold);">WHITBY, ON</div>
        </div>
    </div>

    <table class="prayer-table">
        <thead>
            <tr class="table-header">
                <th>Adhan & Prayer</th>
                <th>Iqamah</th>
            </tr>
        </thead>
        <tbody id="prayer-body"></tbody>
    </table>
</div>

<div id="donation-box">
    <div style="text-align: center; font-weight: 900; color: var(--gold); font-size: 1.2rem;">LOAN REPAYMENT GOAL: C$ 2.5M</div>
    <div class="progress-container">
        <div id="progress-text" class="progress-text">0% Raised</div>
        <div id="progress-fill" class="progress-fill"></div>
    </div>
</div>

<script>
    const GOAL = 2500000, RAISED = 1400000; 
    const iqamaTimes = { Fajr: "6:00", Dhuhr: "2:00", Asr: "6:30", Isha: "9:45" };
    const salahList = [{id:'Fajr',ar:'الفجر'},{id:'Sunrise',ar:'الشروق'},{id:'Dhuhr',ar:'الظهر'},{id:'Asr',ar:'العصر'},{id:'Maghrib',ar:'المغرب'},{id:'Isha',ar:'العشاء'}];
    
    let useArabic = false;
    let prayerTimings = {};

    function format12Hour(timeStr) {
        if (!timeStr) return "--:--";
        let [h, m] = timeStr.split(':').map(Number);
        h = h % 12 || 12;
        return `${h}:${m.toString().padStart(2, '0')}`;
    }

    async function updateData() {
        const lat = 43.8975, lng = -78.9429;
        try {
            const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,is_day&timezone=America/Toronto`);
            const wData = await wRes.json();
            document.getElementById('temp').innerText = Math.round(wData.current.temperature_2m) + "°C";
            document.body.className = wData.current.is_day ? 'theme-day' : 'theme-night';
        } catch (e) {}

        try {
            const pRes = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lng}&method=99&methodSettings=15,null,17.5&school=1`);
            const d = await pRes.json();
            prayerTimings = d.data.timings;
            document.getElementById('big-hijri').innerText = `${d.data.date.hijri.day} ${d.data.date.hijri.month.en}`;
            renderTable();
        } catch (e) {}
    }

    function renderTable() {
        if (!prayerTimings.Fajr) return;
        const now = new Date();
        const curMin = now.getHours() * 60 + now.getMinutes();
        let activeIdx = 0;

        salahList.forEach((s, i) => {
            const [h, m] = prayerTimings[s.id].split(':').map(Number);
            if (curMin >= (h * 60 + m)) activeIdx = i;
        });

        let html = '';
        salahList.forEach((s, i) => {
            const active = (i === activeIdx) ? "active" : "";
            const name = useArabic ? s.ar : s.id;
            const iqama = (s.id === 'Sunrise') ? 'Ishraq' : (s.id === 'Maghrib' ? '+ 3m' : iqamaTimes[s.id]);
            
            html += `<tr class="prayer-row ${active}">
                <td class="col-adhan">
                    <span class="salah-label-overlay">${name}</span>
                    ${format12Hour(prayerTimings[s.id])}
                </td>
                <td class="col-iqama">${iqama}</td>
            </tr>`;
        });
        document.getElementById('prayer-body').innerHTML = html;
    }

    function runClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', second:'2-digit', hour12:true }).split(' ')[0];
        document.getElementById('big-day').innerText = now.toLocaleDateString('en-US', { weekday: 'long' });
        document.getElementById('big-greg').innerText = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    setInterval(() => { useArabic = !useArabic; renderTable(); }, 3000);
    setInterval(runClock, 1000);
    setInterval(updateData, 300000);
    updateData(); runClock();

    setTimeout(() => {
        const percent = Math.min((RAISED / GOAL) * 100, 100).toFixed(1);
        document.getElementById('progress-fill').style.width = percent + "%";
        document.getElementById('progress-text').innerText = `${percent}% Raised ($${RAISED.toLocaleString()})`;
    }, 1000);
</script>
</body>
</html>
