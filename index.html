<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIC Digital Display - Dynamic Loop Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --primary-blue: #1e4571;
            --gold: #d4af37;
            --iqama-green: #2e7d32;
        }

        body { transition: background 2s ease-in-out; margin: 0; padding: 15px; height: 100vh; display: flex; flex-direction: column; font-family: 'Inter', sans-serif; overflow: hidden; box-sizing: border-box; }

        body.theme-day { background: linear-gradient(180deg, #87CEEB 0%, #f4f7f9 100%); }
        body.theme-night { background: linear-gradient(180deg, #0a192f 0%, #1e4571 100%); }

        /* Header Layout */
        .header-box { height: 140px; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; background: var(--primary-blue); border-radius: 25px; border: 4px solid var(--gold); color: white; flex-shrink: 0; }
        .header-img { height: 120px; width: auto; cursor: pointer; }
        
        .merged-info-bar { display: flex; align-items: center; justify-content: center; gap: 40px; flex-grow: 1; }
        #clock-container { background-color: #000; color: #fff; padding: 10px 25px; border-radius: 20px; border: 3px solid var(--gold); }
        #clock { font-size: 3.2rem; font-weight: 900; line-height: 1; }
        
        .date-info-block { text-align: center; }
        .date-main { font-size: 2rem; font-weight: 900; color: #fff; line-height: 1.1; }
        .date-sub { font-size: 1.1rem; color: var(--gold); font-weight: 800; text-transform: uppercase; }

        /* Unified Table Styles */
        .prayer-table { width: 100%; margin-top: 15px; border-collapse: separate; border-spacing: 0 12px; table-layout: fixed; flex-grow: 1; }
        .table-header th { background: var(--primary-blue); color: #ffffff; font-size: 1.8rem; font-weight: 900; text-transform: uppercase; padding: 12px; border-bottom: 3px solid var(--gold); border-radius: 10px; }
        
        .prayer-row td { background: white; height: 10vh; text-align: center; font-size: 4rem; font-weight: 900; border-bottom: 4px solid var(--gold); vertical-align: middle; transition: all 0.5s ease; }
        
        /* Highlighted Active Row */
        .prayer-row.active td { 
            background: linear-gradient(90deg, #fff9c4 0%, #d4af37 100%) !important; 
            color: #000 !important; 
            border-top: 5px solid #b8860b; 
            border-bottom: 5px solid #b8860b;
        }

        /* Combined Language Column */
        .col-name { 
            text-align: left !important; padding-left: 50px !important; 
            border-radius: 20px 0 0 20px; color: var(--primary-blue); 
            font-size: 4.2rem !important; 
        }
        .col-iqama { color: var(--iqama-green); font-size: 4.5rem !important; border-radius: 0 20px 20px 0; }

        /* Countdown specific styling */
        .countdown-text { font-size: 2.2rem; font-weight: 900; color: #d32f2f; display: block; margin-top: -10px; }

        /* Donation Box */
        #donation-box { background: #1b5e20; color: white; padding: 15px 30px; border-radius: 20px; text-align: center; margin-top: 10px; border: 4px solid var(--gold); min-height: 130px; }
        .donate-title { font-size: 2.2rem; font-weight: 900; color: var(--gold); text-transform: uppercase; }
        .progress-container { width: 100%; background: rgba(255, 255, 255, 0.2); height: 40px; border-radius: 20px; border: 2px solid var(--gold); overflow: hidden; position: relative; margin-top: 10px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold) 0%, #fffde7 100%); width: 0%; transition: width 2s ease-in-out; }
        .progress-text { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: 900; font-size: 1.6rem; z-index: 2; }
    </style>
</head>
<body class="theme-day">

<div class="header-box">
    <img src="Muhammad.png" class="header-img" onclick="location.reload()">
    <div class="merged-info-bar">
        <div class="date-info-block">
            <div id="big-day" class="date-main" style="color: var(--gold);">----</div>
            <div id="big-greg" class="date-sub">-- --- ----</div>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center;">
            <div id="clock-container"><div id="clock">00:00:00</div></div>
            <div id="temp" style="font-size: 1.5rem; font-weight: 900; margin-top: 5px;">--°C | WHITBY</div>
        </div>
        <div class="date-info-block">
            <div id="big-hijri" class="date-main">-- --- ----</div>
            <div class="date-sub">Hijri Date</div>
        </div>
    </div>
    <img src="Allah.png" class="header-img">
</div>

<table class="prayer-table">
    <thead>
        <tr class="table-header">
            <th style="width: 40%; text-align: left; padding-left: 50px;">Salah</th>
            <th style="width: 30%;">Starting</th>
            <th style="width: 30%;">Iqamah</th>
        </tr>
    </thead>
    <tbody id="prayer-body"></tbody>
</table>

<div id="donation-box">
    <div class="donate-title">Donate Generously</div>
    <div class="progress-container">
        <div id="progress-text" class="progress-text">0% Raised</div>
        <div id="progress-fill" class="progress-fill"></div>
    </div>
</div>

<script>
    const GOAL = 2500000, RAISED = 1400000; 
    const iqamaTimes = { Fajr: "6:00", Dhuhr: "2:00", Asr: "6:30", Isha: "9:45" };
    const salahList = [{id:'Fajr',ar:'الفجر'},{id:'Sunrise',ar:'الشروق'},{id:'Dhuhr',ar:'الظهر'},{id:'Asr',ar:'العصر'},{id:'Maghrib',ar:'المغرب'},{id:'Isha',ar:'العشاء'}];
    
    let useArabic = false;
    let prayerTimings = {};

    function format12Hour(timeStr) {
        if (!timeStr) return "--:--";
        let [h, m] = timeStr.split(':').map(Number);
        h = h % 12 || 12;
        return `${h}:${m.toString().padStart(2, '0')}`;
    }

    function getMinutes(timeStr) {
        const [h, m] = timeStr.split(':').map(Number);
        return h * 60 + m;
    }

    async function updateData() {
        const lat = 43.8975, lng = -78.9429;
        try {
            const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,is_day&timezone=America/Toronto`);
            const wData = await wRes.json();
            document.getElementById('temp').innerText = Math.round(wData.current.temperature_2m) + "°C | WHITBY";
            document.body.className = wData.current.is_day ? 'theme-day' : 'theme-night';
        } catch (e) {}

        try {
            const pRes = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lng}&method=99&methodSettings=15,null,17.5&school=1`);
            const d = await pRes.json();
            prayerTimings = d.data.timings;
            document.getElementById('big-hijri').innerText = `${d.data.date.hijri.day} ${d.data.date.hijri.month.en} ${d.data.date.hijri.year}`;
            renderTable();
        } catch (e) {}
    }

    function renderTable() {
        if (!prayerTimings.Fajr) return;
        const now = new Date();
        const curMin = now.getHours() * 60 + now.getMinutes();
        let activeIdx = 0;

        salahList.forEach((s, i) => {
            if (curMin >= getMinutes(prayerTimings[s.id])) activeIdx = i;
        });

        let html = '';
        salahList.forEach((s, i) => {
            const active = (i === activeIdx) ? "active" : "";
            const name = useArabic ? s.ar : s.id;
            const fontStyle = useArabic ? "font-family:'Amiri',serif;" : "";
            
            let iqama = (s.id === 'Sunrise') ? 'Ishraq' : (s.id === 'Maghrib' ? '+ 3m' : iqamaTimes[s.id]);
            
            // Countdown Logic for active row
            let adhanDisplay = format12Hour(prayerTimings[s.id]);
            if (active && i < salahList.length - 1) {
                const nextS = salahList[i+1];
                const diff = getMinutes(prayerTimings[nextS.id]) - curMin;
                if (diff > 0 && diff < 120) {
                    adhanDisplay = `<div>${adhanDisplay}</div><div class="countdown-text">Next: ${diff}m</div>`;
                }
            }

            html += `<tr class="prayer-row ${active}">
                <td class="col-name" style="${fontStyle}">${name}</td>
                <td>${adhanDisplay}</td>
                <td class="col-iqama">${iqama}</td>
            </tr>`;
        });
        document.getElementById('prayer-body').innerHTML = html;
    }

    function runClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', second:'2-digit', hour12:true }).split(' ')[0];
        document.getElementById('big-day').innerText = now.toLocaleDateString('en-US', { weekday: 'long' });
        document.getElementById('big-greg').innerText = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        renderTable(); 
    }

    // Toggle language loop every 3 seconds
    setInterval(() => { useArabic = !useArabic; renderTable(); }, 3000);

    setInterval(runClock, 1000);
    setInterval(updateData, 300000);
    updateData(); runClock();

    // Progress Bar
    setTimeout(() => {
        const percent = Math.min((RAISED / GOAL) * 100, 100).toFixed(1);
        document.getElementById('progress-fill').style.width = percent + "%";
        document.getElementById('progress-text').innerText = `${percent}% Raised ($${RAISED.toLocaleString()})`;
    }, 1000);
</script>
</body>
</html>
